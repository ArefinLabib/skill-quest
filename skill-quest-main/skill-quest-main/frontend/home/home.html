<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillQuest</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <div class="navbar">
    <div class="logo">SkillQuest</div>
    <div class="nav-links">
        <a href="/profile">Profile</a>
        <a href="/projects">Browse Projects</a>
        <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>

  <div class="container">
    <div class="section-title">Recommended Projects for You</div>
    <div class="project-list" id="projectList">
      <!-- Recommended projects will be injected here -->
    </div>
  </div>

  <script>
    const projectList = document.getElementById('projectList');

    const fetchRecommendations = async () => {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '../registration/registration.html'; 
        return;
      }

      try {
        const res = await fetch('http://localhost:3000/api/projects/recommendations', {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        const { recommendations } = await res.json();

        if (!Array.isArray(recommendations)) throw new Error("Invalid response format");

        recommendations.forEach(project => {
          const card = document.createElement('div');
          card.className = 'project-card';

          card.innerHTML = `
            <div class="project-title">${project.name}</div>
            <div class="project-description">${project.description}</div>
            <button class="toggle-resources" data-project-id="${project.id}">
              Show Resources
            </button>
            <div class="project-resources" id="resources-${project.id}">
              <div class="resources-header">Recommended Resources:</div>
              <div class="resources-list"></div>
            </div>
          `;

          projectList.appendChild(card);
          
          // Add click handler for the toggle button
          const toggleBtn = card.querySelector('.toggle-resources');
          toggleBtn.addEventListener('click', async () => {
            const resourcesDiv = card.querySelector('.project-resources');
            if (resourcesDiv.style.display === 'none') {
              try {
                const res = await fetch(`http://localhost:3000/api/resources/project/${project.id}`, {
                  headers: {
                    'Authorization': `Bearer ${token}`
                  }
                });
                const { resources } = await res.json();
                
                const resourcesList = card.querySelector('.resources-list');
                resourcesList.innerHTML = '';
                
                if (Object.keys(resources).length === 0) {
                  resourcesList.innerHTML = '<div class="no-resources">No resources available yet</div>';
                } else {
                  for (const [skill, skillResources] of Object.entries(resources)) {
                    const skillHeader = document.createElement('div');
                    skillHeader.className = 'skill-header';
                    skillHeader.textContent = `For ${skill}:`;
                    resourcesList.appendChild(skillHeader);
                    
                    skillResources.forEach(resource => {
                      const resourceEl = document.createElement('div');
                      resourceEl.className = 'resource-item';
                      resourceEl.innerHTML = `
                        <a href="${resource.url}" target="_blank">
                          ${resource.title} (${resource.type})
                        </a>
                      `;
                      resourcesList.appendChild(resourceEl);
                    });
                  }
                }
                
                resourcesDiv.style.display = 'block';
                toggleBtn.textContent = 'Hide Resources';
              } catch (err) {
                console.error('Error loading resources:', err);
                const resourcesList = card.querySelector('.resources-list');
                resourcesList.innerHTML = '<div class="resource-error">Failed to load resources</div>';
              }
            } else {
              resourcesDiv.style.display = 'none';
              toggleBtn.textContent = 'Show Resources';
            }
          });
        });

      } catch (err) {
        projectList.innerHTML = `<div class="error-message">Failed to load recommendations: ${err.message}</div>`;
      }
    };

    fetchRecommendations();

    document.getElementById('logoutBtn').addEventListener('click', e => {
        e.preventDefault();
        localStorage.removeItem('authToken');
        window.location.href = '../registration/registration.html';
    });
  </script>

</body>
</html>
